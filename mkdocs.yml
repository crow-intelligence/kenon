site_name: kenon
site_description: Semantic and co-occurrence graphs for midsized texts
site_url: https://kenon.readthedocs.io
repo_url: https://github.com/crow-intelligence/kenon
repo_name: crow-intelligence/kenon

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://crow-intelligence.github.io/
      name: Crow Intelligence

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Getting Started:
      - index.md
      - quickstart.md
  - API Reference:
      - api/tokenizer.md
      - api/embeddings.md
      - api/cooccurrence.md
      - api/graphs.md
      - api/backbone.md
  - Examples:
      - examples/news_article_analysis.md
      - examples/comparing_two_texts.md
      - examples/multilingual_analysis.md
